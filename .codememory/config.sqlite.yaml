version: 1
database:
  backend: sqlite
  url: ''
  path: .codememory/codememory.sqlite3
  max_connections: 1
models:
  summary_model: opencode-small
  summary_tool: auto
  decision_model: opencode-small
cache:
  enabled: true
  dir: ~/.cache/codememory
  reuse_unchanged: true
  ttl_minutes: 1440
defaults:
  scope_key: dmoliveira/my_opencode
  canonicalize_worktree: true
  prefer_alias: true
session:
  stale_after_minutes: 30
  touch_on_write: true
